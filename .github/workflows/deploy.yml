name: Deploy - coderider despliegue

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Desplegar a producción
    runs-on: ubuntu-latest
    # Si este trabajo no depende de otros, puedes omitir 'needs' o dejarlo así:
    needs: []

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar y Probar
        run: |
          npm install
          npm test

      - name: Desplegar aplicacion
        run: |
          echo "Iniciando despliegue de aplicacion coderider v $(node -p "require('./package.json').version")"
          echo "Sistema desplegado correctamente"
          echo "url: https://streamflow.example.com"
